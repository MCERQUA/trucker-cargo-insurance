<!DOCTYPE html>
<html lang="en">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      font-family: system-ui, -apple-system, sans-serif;

    .phone { margin-top: 1.5rem; font-size: 0.875rem; color: rgba(255,255,255,0.5); }

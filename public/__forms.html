<!DOCTYPE html>
<html>
<head><title>Netlify Forms</title></head>
<body>
  <!-- Netlify form detection stub -->
  <form name="quote-request" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="fullName" />
    <input type="text" name="dotNumber" />
    <input type="email" name="email" />
    <select name="fleetSize">
      <option>1-5 Vehicles</option>
      <option>6-20 Vehicles</option>
      <option>21-50 Vehicles</option>
      <option>50+ Vehicles</option>
    </select>
    <input type="hidden" name="bot-field" />
  </form>
</body>
</html>
